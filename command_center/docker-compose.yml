services:
  backend:
    build: 
      context: ..
      dockerfile: command_center/Dockerfile
    command: uvicorn command_center.backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - "../Astram event data_anonymized - Astram event data_anonymizedb40ac87.csv:/data/astram.csv:ro"
    environment:
      - DATA_PATH=/data/astram.csv
      - MAPMYINDIA_API_KEY=${MAPMYINDIA_API_KEY:-}

  frontend:
    build: 
      context: ..
      dockerfile: command_center/Dockerfile
    command: streamlit run command_center/frontend/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    volumes:
      - "../Astram event data_anonymized - Astram event data_anonymizedb40ac87.csv:/data/astram.csv:ro"
    environment:
      - DATA_PATH=/data/astram.csv
      - MAPMYINDIA_API_KEY=${MAPMYINDIA_API_KEY:-}
    depends_on:
      - backend
